    OrderCreateRequest:
      type: object
      description: "Сериализатор для создания заказа\n\n⚙️ ПОЛНОСТЬЮ ЗАЩИЩЕННОЕ СОЗДАНИЕ
        ЗАКАЗА\n\nИспользуется операторами для создания заказа для клиента.\n\n\U0001F4CC
        АВТОМАТИЧЕСКИЕ ПОЛЯ (из ShiftSession оператора):\n- business_point: автоматически
        определяется из активной смены оператора\n- created_by: автоматически установится
        текущий оператор\n- shift_session: привязывается к текущей смене оператора\n-
        session: привязывается к дневной сессии из смены\n\n\U0001F4DD ТРЕБУЕМЫЕ ПОЛЯ:\n-
        user: UID (UUID) клиента, для кого создается заказ (ОБЯЗАТЕЛЬНО)\n- description:
        описание заказа (ОБЯЗАТЕЛЬНО)\n\n\U0001F513 ОПЦИОНАЛЬНЫЕ ПОЛЯ:\n- template:
        шаблон заказа (ID)\n- appeal: обращение, из которого создан заказ (ID, для
        преобразования обращения в заказ)\n- amount: сумма заказа (default=0)\n- is_paid:
        флаг оплаты (default=False)\n- expected_ready_at: когда должен быть готов
        заказ\n\n❌ business_point НЕ ПЕРЕДАВАЙТЕ в запросе! Определяется автоматически
        из ShiftSession оператора.\n\n\U0001F6E1️ ЗАЩИТА:\n- Только операторы могут
        создать заказ\n- Оператор должен иметь активную ShiftSession\n- Заказ автоматически
        привязывается к текущей бизнес-точке оператора\n- Невозможно создать заказ
        в другой бизнес-точке"
      properties:
        user:
          type: string
          writeOnly: true
          description: UID (UUID) клиента. Используется, если appeal_id не передан.
        template:
          type: integer
