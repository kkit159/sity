          title: Описание
          description: Описание заказа (ОБЯЗАТЕЛЬНО)
        amount:
          type: string
          format: decimal
          pattern: ^-?\d{0,8}(?:\.\d{0,2})?$
          title: Сумма
          description: Сумма заказа в рублях (default=0)
        is_paid:
          type: boolean
          title: Заказ оплачен
          description: Оплачен ли заказ (default=False)
        expected_ready_at:
          type: string
          format: date-time
          nullable: true
          title: Ожидаемая дата готовности
          description: Когда должен быть готов заказ (опционально)
        estimated_time:
