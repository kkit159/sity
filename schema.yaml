  /api/auth/password/change/:
    post:
      operationId: auth_password_change_create
      description: "\n        Изменяет пароль текущего авторизованного пользователя.\n
        \       \n        <strong>Требования:</strong>\n        - Пользователь должен
        быть авторизован (JWT токен)\n        - Необходимо указать текущий (старый)
        пароль\n        - Новый пароль должен быть не менее 8 символов\n        \n
        \       <strong>Пример запроса:</strong>\n        ```json\n        {\n            \"old_password\":
        \"CurrentPassword123!\",\n            \"new_password\": \"NewSecurePassword123!\",\n
        \           \"new_password_confirm\": \"NewSecurePassword123!\"\n        }\n
        \       ```\n        \n        <strong>Пример успешного ответа (200):</strong>\n
        \       ```json\n        {\n            \"detail\": \"Пароль успешно изменен\"\n
        \       }\n        ```\n        \n        <strong>Ошибки:</strong>\n        -
        400: неверный старый пароль или пароли не совпадают\n        - 401: пользователь
        не авторизован\n        "
      summary: Смена пароля
      tags:
      - Authentication
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PasswordChangeRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/PasswordChangeRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/PasswordChangeRequest'
        required: true
      security:
      - bearerAuth: []
      - cookieAuth: []
      - telegramAuth: []
      - bearerAuth: []
      responses:
        '200':
          description: Пароль успешно изменен
        '400':
          description: Неверный старый пароль или пароли не совпадают
        '401':
          description: Требуется аутентификация
  /api/auth/refresh/:
    post:
      operationId: auth_refresh_create
      description: |
        Получение нового токена для аутентификации.

        **Параметры запроса:**
        - `refresh` - refresh токен, полученный при входе в систему

        **Когда использовать:**
        Используйте этот endpoint когда текущий токен истек.
      summary: Обновление токена
      tags:
      - Authentication
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TokenRefreshRequestRequest'
            examples:
              ЗапросНаОбновление:
                value:
                  refresh: eyJ0eXAiOiJKV1QiLCJhbGc...
                summary: Запрос на обновление
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/TokenRefreshRequestRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/TokenRefreshRequestRequest'
        required: true
      security:
      - bearerAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                properties:
                  access:
                    type: string
                    description: Новый JWT access токен
              examples:
                УспешноеОбновление:
                  value:
                    access: eyJ0eXAiOiJKV1QiLCJhbGc...
                  summary: Успешное обновление
          description: Новый access токен успешно получен
        '401':
          description: Неверный или истекший refresh токен
  /api/auth/send_code/:
    post:
      operationId: auth_send_code_create
      description: |-
        Универсальная ручка для отправки кода подтверждения. Если `method` не передан — повторно отправляет на тот же адрес. Если `method` передан — меняет метод и отправляет на новый адрес.

        **Кулдаун:** не чаще 1 раза в минуту. В ответе `cooldown_until` — ISO datetime когда кулдаун закончится.
      summary: Отправить / повторно отправить код 2FA (с опциональной сменой метода)
      tags:
      - Authentication
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                session_id:
                  type: string
                  description: ID сессии из /auth/login/
                method:
                  type: string
                  enum:
                  - sms
                  - email
                  description: Новый метод (опционально)
                email:
                  type: string
                  format: email
                  description: Email (если method=email)
                phone:
                  type: string
                  description: Телефон (если method=sms)
              required:
              - session_id
      security:
      - bearerAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: code_sent
                  method:
                    type: string
                    example: email
                  masked_recipient:
                    type: string
                    example: u***@mail.ru
                  expires_in_seconds:
                    type: integer
                    example: 600
                  cooldown_until:
                    type: string
                    format: date-time
                    example: '2026-03-06T21:30:00Z'
          description: ''
        '400':
          content:
            application/json:
              schema:
                type: object
                properties:
                  detail:
                    type: string
          description: ''
        '429':
          content:
            application/json:
              schema:
                type: object
                properties:
                  detail:
                    type: string
                  retry_after_seconds:
                    type: integer
                  cooldown_until:
                    type: string
                    format: date-time
          description: ''
  /api/auth/verify/:
    post:
      operationId: auth_verify_create
      description: |-
        Универсальная ручка для проверки OTP. Обрабатывает два сценария:

        **1. Регистрация** (`POST /api/register/` выдал `session_id`):
        в OTP есть metadata с данными пользователя → создаём учётную запись и выдаём JWT.

        **2. Вход с 2FA** (`POST /api/auth/login/` выдал `session_id`):
        в OTP уже есть `user` → просто выдаём JWT без создания пользователя.
      summary: Верификация OTP кода (регистрация и 2FA-логин)
      tags:
      - Authentication
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/VerifyRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/VerifyRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/VerifyRequest'
        required: true
      security:
      - bearerAuth: []
      - {}
      responses:
        '200':
          description: OTP проверен, JWT выдан
        '400':
          description: Неверный / истекший код
