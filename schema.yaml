                  amount: 2500.0
                summary: Создание заказа из обращения
                description: Клиент определяется автоматически из appeal_id
              СозданиеЗаказаИзШаблона:
                value:
                  appeal_id: 5
                  template_id: 1
                  description: Заказ из шаблона
                summary: Создание заказа из шаблона
