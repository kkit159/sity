      description: "\n        Создает новый заказ для клиента. Доступно только для
        операторов (role=OP).\n\n        Права доступа: Только операторы с активной
        сменой (ShiftSession).\n        Бизнес-точка и оператор определяются автоматически
        из текущей смены.\n\n        Обязательные поля:\n        - `description` -
        Описание заказа\n\n        Идентификация клиента (одно из двух):\n        -
        `appeal_id` - ID обращения (клиент определяется автоматически из обращения)\n
        \       - `user` - UID (UUID) клиента, если заказ создается без привязки к
        обращению\n\n        Опциональные поля:\n        - `template_id` - ID шаблона
        заказа\n        - `amount` - Сумма заказа в рублях (по умолчанию 0)\n        -
        `is_paid` - Флаг оплаты (по умолчанию False)\n        - `expected_ready_at`
        - Ожидаемое время готовности\n        "
