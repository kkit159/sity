      operationId: auth_password_reset_request_create
      description: "\n        Отправляет письмо со ссылкой для сброса пароля на указанный
        email.\n        \n        <strong>Пример запроса:</strong>\n        ```json\n
        \       {\n            \"email\": \"user@example.com\"\n        }\n        ```\n
